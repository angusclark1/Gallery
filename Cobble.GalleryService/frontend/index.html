<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cobble Gallery</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="site-header">
        <h1>Cobble Gallery</h1>
        <span class="status-dot" id="statusDot"></span>
    </header>

    <div class="layout">

        <!-- LEFT: Controls -->
        <aside class="controls-panel">
            <section class="control-group">
                <h2>Controls</h2>
                <label for="apiBase">API Base</label>
                <input id="apiBase" type="text" value="http://localhost:8080" />
                <label for="memberId">Member ID</label>
                <input id="memberId" type="text" placeholder="Enter member ID" />
                <button class="btn-primary" onclick="loadGallery()">Load Gallery</button>
            </section>

            <section class="control-group">
                <h2>Upload Image</h2>
                <label for="title">Title</label>
                <input id="title" type="text" placeholder="e.g. Sunset" />
                <label for="description">Description</label>
                <input id="description" type="text" placeholder="Short description" />
                <label for="privacy">Privacy</label>
                <select id="privacy">
                    <option value="Pub">Public</option>
                    <option value="Pvt" selected>Private</option>
                </select>
                <label for="file">Image File</label>
                <input id="file" type="file" accept="image/jpeg,image/png" />
                <button class="btn-primary" onclick="upload()">Upload</button>
            </section>

            <div id="status" class="status-msg"></div>
        </aside>

        <!-- RIGHT: Gallery -->
        <main class="gallery-main">

            <!-- Featured hex -->
            <div class="featured-hex-wrap" id="featuredWrap">
                <div class="featured-hex-inner" id="featuredInner">
                    <div class="featured-hex-shape">
                        <div class="featured-placeholder">
                            <span>Select an image</span>
                        </div>
                        <img id="featuredImg" src="" alt="" style="display:none" />
                    </div>
                </div>
                <div class="featured-info" id="featuredInfo">
                    <h2 id="featuredTitle">—</h2>
                    <p id="featuredDesc"></p>
                    <div class="featured-meta" id="featuredMeta"></div>
                    <button class="btn-danger" id="featuredDelete" style="display:none" onclick="delFeatured()">Delete</button>
                </div>
            </div>

            <!-- Hex grid -->
            <ul class="honeycomb" id="grid"></ul>

        </main>

    </div>

    <script src="app.js"></script>
</body>
</html>
